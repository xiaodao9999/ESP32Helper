name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
├── .github/workflows/android.yml  # GitHub Actions编译配置
├── app/
│   ├── src/main/
│   │   ├── java/com/zhixin/esp32helper/
│   │   │   ├── ui/
│   │   │   │   ├── main/MainActivity.java        # 主界面
│   │   │   │   ├── connect/ConnectActivity.java   # 设备连接界面
│   │   │   │   └── editor/EditorActivity.java    # 代码编辑界面
│   │   │   ├── usb/UsbCommunication.java          # USB OTG通信
│   │   │   └── ESP32Application.java
│   │   ├── res/
│   │   │   ├── layout/                             # 3个界面布局
│   │   │   └── values/                             # 字符串、颜色、主题
│   │   └── AndroidManifest.xml
│   └── build.gradle
├── build.gradle
└── settings.gradle      uses: android-actions/setup-android@v3
      with:
        api-level: 34

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.4
        
    - name: Build with Gradle
      run: gradle assembleDebug
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
